# ──────────────────────────────────────────────────────────────
# Local development stack for listmonk
# Usage:
#   cp .env.sample .env          # fill in your values
#   docker compose up -d         # start postgres + listmonk
#   open http://localhost:9000   # admin UI
# ──────────────────────────────────────────────────────────────

version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: listmonk
      POSTGRES_PASSWORD: listmonk
      POSTGRES_DB: listmonk
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U listmonk"]
      interval: 5s
      timeout: 5s
      retries: 10

  listmonk:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      # App
      PORT: 9000
      LISTMONK_ADMIN_USER: listmonk
      LISTMONK_ADMIN_PASSWORD: listmonk_dev_password

      # Database — parsed by docker-entrypoint.sh
      DATABASE_URL: "postgresql://listmonk:listmonk@db:5432/listmonk"
      DB_SSLMODE: disable

      # Set to "true" ONCE on first run to create DB tables, then remove
      LISTMONK_INSTALL: "true"

volumes:
  postgres_data:
