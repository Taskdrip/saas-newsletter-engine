components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── Profile ────────────────────────────────────────────────────────────
    UserProfile:
      type: object
      required: [id, clerkId, email, createdAt]
      properties:
        id:
          type: integer
        clerkId:
          type: string
        email:
          type: string
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        timezone:
          type: ["string", "null"]
        createdAt:
          type: string
  

    UserProfileUpdate:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        timezone:
          type: string

    # ── Organizations ──────────────────────────────────────────────────────
    Organization:
      type: object
      required: [id, name, slug, ownerId, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        logoUrl:
          type: ["string", "null"]
        ownerId:
          type: integer
        plan:
          type: string
          enum: [free, starter, pro, business, enterprise]
        createdAt:
          type: string
  

    OrganizationInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        slug:
          type: string
        logoUrl:
          type: string

    OrganizationUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        logoUrl:
          type: string

    # ── Workspaces ─────────────────────────────────────────────────────────
    Workspace:
      type: object
      required: [id, orgId, name, createdAt]
      properties:
        id:
          type: integer
        orgId:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        fromName:
          type: ["string", "null"]
        fromEmail:
          type: ["string", "null"]
        replyToEmail:
          type: ["string", "null"]
        timezone:
          type: ["string", "null"]
        subscriberCount:
          type: integer
        createdAt:
          type: string
  

    WorkspaceInput:
      type: object
      required: [orgId, name]
      properties:
        orgId:
          type: integer
        name:
          type: string
          minLength: 1
        description:
          type: string
        fromName:
          type: string
        fromEmail:
          type: string

        replyToEmail:
          type: string

        timezone:
          type: string

    WorkspaceUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        fromName:
          type: string
        fromEmail:
          type: string

        replyToEmail:
          type: string

        timezone:
          type: string

    # ── Members ────────────────────────────────────────────────────────────
    Member:
      type: object
      required: [id, workspaceId, email, role, status, createdAt]
      properties:
        id:
          type: integer
        workspaceId:
          type: integer
        userId:
          type: ["integer", "null"]
        email:
          type: string
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        role:
          type: string
          enum: [owner, admin, marketing_manager, editor, analyst, viewer]
        status:
          type: string
          enum: [active, invited, suspended]
        createdAt:
          type: string
  

    MemberInvite:
      type: object
      required: [email, role]
      properties:
        email:
          type: string

        role:
          type: string
          enum: [admin, marketing_manager, editor, analyst, viewer]

    MemberUpdate:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [admin, marketing_manager, editor, analyst, viewer]

    # ── Subscribers ────────────────────────────────────────────────────────
    Subscriber:
      type: object
      required: [id, workspaceId, email, status, createdAt]
      properties:
        id:
          type: integer
        workspaceId:
          type: integer
        email:
          type: string
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, unsubscribed, bounced, complained]
        tags:
          type: array
          items:
            type: string
        attributes:
          type: object
          additionalProperties: true
        source:
          type: ["string", "null"]
        listIds:
          type: array
          items:
            type: integer
        createdAt:
          type: string
  
        updatedAt:
          type: string
  

    SubscriberList:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Subscriber"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    SubscriberInput:
      type: object
      required: [workspaceId, email]
      properties:
        workspaceId:
          type: integer
        email:
          type: string

        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        tags:
          type: array
          items:
            type: string
        listIds:
          type: array
          items:
            type: integer
        attributes:
          type: object
          additionalProperties: true

    SubscriberUpdate:
      type: object
      properties:
        email:
          type: string

        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        status:
          type: string
          enum: [active, unsubscribed]
        tags:
          type: array
          items:
            type: string
        attributes:
          type: object
          additionalProperties: true

    SubscriberImport:
      type: object
      required: [workspaceId, subscribers]
      properties:
        workspaceId:
          type: integer
        subscribers:
          type: array
          items:
            $ref: "#/components/schemas/SubscriberInput"
        listIds:
          type: array
          items:
            type: integer
        updateExisting:
          type: boolean
          default: true

    ImportResult:
      type: object
      required: [imported, updated, skipped, errors]
      properties:
        imported:
          type: integer
        updated:
          type: integer
        skipped:
          type: integer
        errors:
          type: array
          items:
            type: string

    # ── Lists ──────────────────────────────────────────────────────────────
    SubscriberListEntity:
      type: object
      required: [id, workspaceId, name, type, createdAt]
      properties:
        id:
          type: integer
        workspaceId:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        type:
          type: string
          enum: [static, dynamic]
        isPublic:
          type: boolean
        subscriberCount:
          type: integer
        createdAt:
          type: string
  

    ListInput:
      type: object
      required: [workspaceId, name]
      properties:
        workspaceId:
          type: integer
        name:
          type: string
          minLength: 1
        description:
          type: string
        type:
          type: string
          enum: [static, dynamic]
          default: static
        isPublic:
          type: boolean
          default: false

    ListUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        isPublic:
          type: boolean

    # ── Segments ───────────────────────────────────────────────────────────
    Segment:
      type: object
      required: [id, workspaceId, name, createdAt]
      properties:
        id:
          type: integer
        workspaceId:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        conditions:
          type: object
          additionalProperties: true
        subscriberCount:
          type: integer
        createdAt:
          type: string
  

    SegmentInput:
      type: object
      required: [workspaceId, name]
      properties:
        workspaceId:
          type: integer
        name:
          type: string
          minLength: 1
        description:
          type: string
        conditions:
          type: object
          additionalProperties: true

    SegmentUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        conditions:
          type: object
          additionalProperties: true

    # ── Tags ───────────────────────────────────────────────────────────────
    Tag:
      type: object
      required: [id, workspaceId, name, createdAt]
      properties:
        id:
          type: integer
        workspaceId:
          type: integer
        name:
          type: string
        color:
          type: ["string", "null"]
        subscriberCount:
          type: integer
        createdAt:
          type: string
  

    TagInput:
      type: object
      required: [workspaceId, name]
      properties:
        workspaceId:
          type: integer
        name:
          type: string
          minLength: 1
        color:
          type: string

    # ── Campaigns ──────────────────────────────────────────────────────────
    Campaign:
      type: object
      required: [id, workspaceId, name, type, status, createdAt]
      properties:
        id:
          type: integer
        workspaceId:
          type: integer
        name:
          type: string
        subject:
          type: ["string", "null"]
        previewText:
          type: ["string", "null"]
        fromName:
          type: ["string", "null"]
        fromEmail:
          type: ["string", "null"]
        replyTo:
          type: ["string", "null"]
        type:
          type: string
          enum: [regular, automated, rss, drip, transactional, ab_test, newsletter]
        status:
          type: string
          enum: [draft, scheduled, running, paused, finished, cancelled]
        templateId:
          type: ["integer", "null"]
        listIds:
          type: array
          items:
            type: integer
        segmentIds:
          type: array
          items:
            type: integer
        scheduledAt:
          type: ["string", "null"]
  
        sentAt:
          type: ["string", "null"]
  
        totalRecipients:
          type: integer
        createdAt:
          type: string
  
        updatedAt:
          type: string
  

    CampaignPage:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Campaign"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    CampaignInput:
      type: object
      required: [workspaceId, name, type]
      properties:
        workspaceId:
          type: integer
        name:
          type: string
          minLength: 1
        subject:
          type: string
        previewText:
          type: string
        fromName:
          type: string
        fromEmail:
          type: string

        replyTo:
          type: string

        type:
          type: string
          enum: [regular, automated, rss, drip, transactional, ab_test, newsletter]
        templateId:
          type: integer
        listIds:
          type: array
          items:
            type: integer
        segmentIds:
          type: array
          items:
            type: integer

    CampaignUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        subject:
          type: string
        previewText:
          type: string
        fromName:
          type: string
        fromEmail:
          type: string

        replyTo:
          type: string

        templateId:
          type: integer
        listIds:
          type: array
          items:
            type: integer
        segmentIds:
          type: array
          items:
            type: integer

    CampaignSchedule:
      type: object
      required: [scheduledAt]
      properties:
        scheduledAt:
          type: string
  

    CampaignStats:
      type: object
      required: [campaignId, sent, delivered, opened, clicked, bounced, unsubscribed, complained]
      properties:
        campaignId:
          type: integer
        sent:
          type: integer
        delivered:
          type: integer
        opened:
          type: integer
        clicked:
          type: integer
        bounced:
          type: integer
        unsubscribed:
          type: integer
        complained:
          type: integer
        openRate:
          type: number
        clickRate:
          type: number
        bounceRate:
          type: number
        unsubscribeRate:
          type: number
        revenue:
          type: number
        topLinks:
          type: array
          items:
            $ref: "#/components/schemas/LinkStat"
        opensByDevice:
          type: object
          additionalProperties: true
        opensByCountry:
          type: object
          additionalProperties: true

    LinkStat:
      type: object
      required: [url, clicks]
      properties:
        url:
          type: string
        clicks:
          type: integer
        uniqueClicks:
          type: integer

    # ── Templates ──────────────────────────────────────────────────────────
    Template:
      type: object
      required: [id, workspaceId, name, category, createdAt]
      properties:
        id:
          type: integer
