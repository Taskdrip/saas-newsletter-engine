# ──────────────────────────────────────────────────────────────
# Railway deployment configuration for listmonk
# https://docs.railway.com/reference/config-as-code
# ──────────────────────────────────────────────────────────────

[build]
  builder = "DOCKERFILE"
  dockerfilePath = "Dockerfile"

[deploy]
  # startCommand is intentionally omitted — the Dockerfile ENTRYPOINT+CMD handles startup.
  # Increased timeout: idempotent --install runs on every boot before listmonk starts.
  healthcheckPath = "/health"
  healthcheckTimeout = 120
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3
